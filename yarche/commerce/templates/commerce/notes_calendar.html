{% extends "layout.html" %}
{% load static %}
{% block content %}
	<div class="notes-calendar-page" id="notes-container">
		<div class="notes-calendar-header">
			<button id="prev-month-btn" class="button" type="button">&#8592;</button>
			<h2 id="calendar-title"></h2>
			<button id="next-month-btn" class="button" type="button">&#8594;</button>
		</div>

		<div id="calendar-grid" class="calendar-grid"></div>

		<div id="context-menu" class="dropdown-menu"
			data-is-admin="{% if request.user.user_type and request.user.user_type.name == 'Администратор' %}true{% else %}false{% endif %}">
			<a class="dropdown-item context-action" id="add-note-button" data-action="add">Добавить заметку</a>
			<a class="dropdown-item context-action" id="edit-note-button" data-action="edit">Изменить заметку</a>
			<a class="dropdown-item context-action" id="delete-note-button" data-action="delete">Удалить заметку</a>
		</div>
	</div>
{% endblock content %}
{% block extra_scripts %}
	{{ block.super }}
	<script src="{% static 'commerce/js/commerce.js' %}" type="module"></script>
{% endblock extra_scripts %}
