{% load static %}
{% load components %}
{% add_style 'css/modal-form.css' %}
<form class="modal-form" id="assets-form" method="post">
    <div class="modal-form__content">
        {% csrf_token %}
        
		<input class="modal-form__input"
                    type="text"
                    id="model"
                    spellcheck="false"
                    autocapitalize="off"
                    autocorrect="off"
                    autocomplete="off"
					hidden
                    name="model">
		<div class="modal-form__group">
            <label class="modal-form__label" for="name">Название</label>
            <input class="modal-form__input"
                    type="text"
                    id="name"
                    spellcheck="false"
                    autocapitalize="off"
                    autocorrect="off"
                    autocomplete="off"
                    name="name">
        </div>
		<div class="modal-form__group modal-form__group--width-30">
				<label class="modal-form__label" for="amount">Сумма</label>
				 <input class="modal-form__input"
                   type="text"
                   id="amount"
                   name="amount"
                   spellcheck="false"
                       autocapitalize="off"
                       autocorrect="off"
                       autocomplete="off"
                   placeholder="0">
			</div>
        
        <div class="modal-form__buttons">
            <button class="button modal-form__button" type="submit">Сохранить</button>
            <button class="button modal-form__button button--cancel" type="button">Отменить</button>
        </div>
    </div>
</form>
